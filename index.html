<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIF-C01 Exam Prep</title>

<style>
:root{--bg:#0c0f14;--surface:#13181f;--surface2:#1a2130;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e8edf5;--muted:#7a8799;--accent:#4f9eff;--green:#34d399;--amber:#fbbf24;--red:#f87171;--d1:#34d399;--d2:#a78bfa;--d3:#fbbf24;--d4:#f87171;--d5:#4f9eff;--esol:#2dd4bf;--trigger:#f59e0b;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
[hidden]{display:none !important;}
/* ── v2 app shell ────────────────────────────────────────── */
#v2-app{display:flex;flex-direction:column;min-height:100vh;}
#v2-app .topbar{flex-shrink:0;background:rgba(12,15,20,0.97);border-bottom:0.5px solid var(--border2);padding:0 20px;display:flex;align-items:center;gap:12px;height:46px;overflow-x:auto;scrollbar-width:none;}
#v2-app .topbar::-webkit-scrollbar{display:none;}
#v2-app .logo{font-size:16px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;padding-right:14px;border-right:0.5px solid var(--border2);}
#v2-app .logo .v-flag{display:inline-block;margin-left:6px;font-size:11px;color:var(--accent);background:rgba(79,158,255,.12);border:0.5px solid rgba(79,158,255,.3);border-radius:8px;padding:1px 6px;letter-spacing:.05em;vertical-align:middle;}
#v2-app .v2-search-wrap{flex:1;max-width:380px;display:flex;align-items:center;gap:6px;background:var(--surface);border:0.5px solid var(--border2);border-radius:18px;padding:4px 10px;}
#v2-app .v2-search-input{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-size:15px;}
#v2-app .v2-search-input::placeholder{color:var(--muted);}
#v2-app .v2-clear{background:transparent;border:0;color:var(--muted);cursor:pointer;font-size:15px;}
#v2-app .v2-search-results{position:absolute;top:46px;left:50%;transform:translateX(-50%);width:min(580px,calc(100% - 40px));background:var(--surface);border:0.5px solid var(--border2);border-radius:10px;max-height:60vh;overflow-y:auto;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.4);}
#v2-app .v2-sr-item{padding:10px 14px;cursor:pointer;border-bottom:0.5px solid var(--border);}
#v2-app .v2-sr-item:hover,#v2-app .v2-sr-item:focus{background:rgba(255,255,255,.04);outline:none;}
#v2-app .v2-sr-kind{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
#v2-app .v2-sr-text{font-size:15px;color:var(--text);}
#v2-app .v2-sr-text mark{background:rgba(251,191,36,.3);color:var(--text);padding:0 2px;border-radius:2px;}
@keyframes v2-search-pulse{0%{box-shadow:0 0 0 0 rgba(251,191,36,.55);background:rgba(251,191,36,.18);}60%{box-shadow:0 0 0 8px rgba(251,191,36,0);background:rgba(251,191,36,.10);}100%{box-shadow:0 0 0 0 rgba(251,191,36,0);background:transparent;}}
#v2-app .v2-search-target{animation:v2-search-pulse 1.6s ease-out 1;border-radius:9px;}
#v2-app tr.v2-search-target>td{background:rgba(251,191,36,.18);}
#v2-app .tab-bar{flex-shrink:0;display:flex;gap:4px;padding:8px 20px;background:var(--bg);border-bottom:0.5px solid var(--border);overflow-x:auto;scrollbar-width:none;}
#v2-app .tab-bar::-webkit-scrollbar{display:none;}
#v2-app .v2-tab{font-size:14px;font-weight:500;padding:6px 14px;border-radius:18px;border:0.5px solid var(--border2);cursor:pointer;background:transparent;color:var(--muted);white-space:nowrap;transition:all .15s;}
#v2-app .v2-tab:hover{color:var(--text);}
#v2-app .v2-tab.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}
#v2-app .v2-panel{display:none;padding:14px 20px 28px;flex:1;}
#v2-app .v2-panel.active{display:block;}
#v2-app .sub-tab-bar{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;padding-bottom:10px;border-bottom:0.5px solid var(--border);}
#v2-app .v2-subtab{font-size:13px;font-weight:500;padding:4px 10px;border-radius:14px;border:0.5px solid var(--border2);cursor:pointer;background:transparent;color:var(--muted);white-space:nowrap;}
#v2-app .v2-subtab:hover{color:var(--text);}
#v2-app .v2-subtab.active{background:rgba(255,255,255,.08);color:var(--text);font-weight:600;}
#v2-app .v2-h{font-size:17px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
#v2-app .v2-h .v2-pct{font-size:12px;padding:2px 8px;border-radius:10px;font-weight:500;background:rgba(255,255,255,.06);color:var(--muted);}
#v2-app .v2-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:15px;}
#v2-app .v2-empty strong{color:var(--text);display:block;font-size:17px;margin-bottom:6px;}
#v2-app .v2-card{background:var(--surface);border:0.5px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px;}
#v2-app .v2-card.cluster-tagged{border-left:2px solid var(--accent);}
#v2-app details.v2-fc-collapse > summary{list-style:none;}
#v2-app details.v2-fc-collapse > summary::-webkit-details-marker{display:none;}
#v2-app details.v2-fc-collapse > summary::marker{content:'';}
#v2-app details.v2-fc-collapse .v2-fc-caret{display:inline-block;transition:transform .15s ease;}
#v2-app details.v2-fc-collapse[open] .v2-fc-caret{transform:rotate(90deg);}
#v2-app details.v2-fc-collapse > summary:hover{color:var(--accent);}
#v2-app .trigger-line{font-size:13px;color:#d4a843;margin-top:8px;padding:6px 8px;background:rgba(245,158,11,.08);border-radius:5px;border-left:2px solid var(--trigger);}
#v2-app .mnemonic-line{font-size:13px;color:var(--esol);margin-top:6px;padding:6px 8px;background:rgba(45,212,191,.07);border-radius:5px;border-left:2px solid var(--esol);}

/* ── drill / mock controls ───────────────────────────────── */
#v2-app .v2-btn{background:var(--accent);color:#000;border:0;border-radius:8px;padding:8px 16px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.02em;}
#v2-app .v2-btn:hover{filter:brightness(1.1);}
#v2-app .v2-btn.secondary{background:transparent;color:var(--text);border:0.5px solid var(--border2);}
#v2-app .v2-btn.danger{background:var(--red);color:#000;}
#v2-app .v2-pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
#v2-app .v2-meta{font-size:14px;color:var(--muted);margin-bottom:10px;}
#v2-app .v2-q-stem{font-size:16px;line-height:1.6;margin-bottom:14px;color:var(--text);}
#v2-app .v2-opt{display:block;width:100%;text-align:left;background:var(--surface);border:0.5px solid var(--border2);border-radius:7px;padding:10px 12px;margin-bottom:6px;color:var(--text);font-size:15px;cursor:pointer;transition:border-color .12s,background .12s;}
#v2-app .v2-opt:hover{border-color:var(--accent);}
#v2-app .v2-opt.sel{background:rgba(79,158,255,.12);border-color:var(--accent);}
#v2-app .v2-opt.correct{background:rgba(52,211,153,.12);border-color:var(--green);color:var(--green);}
#v2-app .v2-opt.wrong{background:rgba(248,113,113,.12);border-color:var(--red);color:var(--red);}
#v2-app .v2-exp{margin-top:12px;padding:12px;background:var(--surface2);border-radius:7px;font-size:14px;color:#bcc6d4;line-height:1.6;border-left:2px solid var(--accent);}
#v2-app .v2-exp .exam-trigger{display:block;margin-top:8px;color:#d4a843;font-weight:600;}
#v2-app .timer{font-variant-numeric:tabular-nums;font-weight:700;font-size:17px;padding:4px 10px;border-radius:8px;background:rgba(79,158,255,.12);color:var(--accent);}
#v2-app .timer.warn{background:rgba(251,191,36,.15);color:var(--amber);}
#v2-app .timer.crit{background:rgba(248,113,113,.15);color:var(--red);}
#v2-app .progress-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:14px;}
#v2-app .progress-bar > div{height:100%;background:var(--accent);transition:width .2s;}

/* ── flashcard flip ──────────────────────────────────────── */
#v2-app .v2-fc{perspective:1200px;height:280px;margin:0 auto 14px;max-width:560px;}
#v2-app .v2-fc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s;cursor:pointer;}
#v2-app .v2-fc-inner.flipped{transform:rotateY(180deg);}
#v2-app .v2-fc-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--surface);border:0.5px solid var(--border2);border-radius:12px;padding:20px;display:flex;flex-direction:column;justify-content:center;}
#v2-app .v2-fc-face.back{transform:rotateY(180deg);}
#v2-app .v2-fc-front-text{font-size:19px;font-weight:600;line-height:1.5;text-align:center;}
#v2-app .v2-fc-back-text{font-size:15px;line-height:1.6;color:#bcc6d4;}
#v2-app .v2-fc-back-text strong{color:var(--text);}
#v2-app .v2-fc-tag{position:absolute;top:10px;right:10px;font-size:11px;padding:2px 7px;border-radius:8px;background:rgba(255,255,255,.06);color:var(--muted);letter-spacing:.05em;}
#v2-app .v2-fc-actions{display:flex;gap:6px;justify-content:center;margin-top:6px;}
#v2-app .v2-fc-actions .v2-btn{padding:7px 14px;font-size:14px;}

/* ── tricky-term clusters ────────────────────────────────── */
#v2-app .v2-cluster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;}
#v2-app .v2-cluster-card{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;}
#v2-app .v2-cluster-card:hover{border-color:var(--accent);}
#v2-app .v2-cluster-name{font-size:15px;font-weight:600;margin-bottom:4px;}
#v2-app .v2-cluster-meta{font-size:13px;color:var(--muted);}
</style>
</head>
<body>


<!-- ── v2 app (Enhanced) ───────────────────────────────────────── -->
<div id="v2-app" data-theme="dark">
  <div class="topbar">
    <div class="logo">AIF-C01</div>
    <span class="epill"><span>65</span> questions</span>
    <span class="epill"><span>90</span> min</span>
    <span class="epill">Pass: <span>700</span>/1000</span>
    <div class="v2-search-wrap">
      <span style="color:var(--muted);font-size:16px;">⌕</span>
      <input class="v2-search-input" id="v2-search-input" type="text" placeholder="Search cards, flashcards, questions, clusters... (press /)" autocomplete="off">
      <button class="v2-clear" id="v2-search-clear" style="display:none">✕</button>
    </div>
  </div>
  <div class="v2-search-results" id="v2-search-results" hidden></div>
  <div class="tab-bar" role="tablist">
    <button class="v2-tab" data-tab="study" role="tab">Study</button>
    <button class="v2-tab active" data-tab="drill" role="tab">Drill</button>
    <button class="v2-tab" data-tab="mock" role="tab">Mock Exam</button>
  </div>

  <!-- STUDY -->
  <div class="v2-panel" id="v2-panel-study" role="tabpanel">
    <div class="sub-tab-bar" role="tablist">
      <button class="v2-subtab active" data-sub="d1" role="tab">D1 · 20%</button>
      <button class="v2-subtab" data-sub="d2" role="tab">D2 · 24%</button>
      <button class="v2-subtab" data-sub="d3" role="tab">D3 · 28%</button>
      <button class="v2-subtab" data-sub="d4" role="tab">D4 · 14%</button>
      <button class="v2-subtab" data-sub="d5" role="tab">D5 · 14%</button>
      <button class="v2-subtab" data-sub="cheat" role="tab">Reference</button>
    </div>
    <div id="v2-study-body"></div>
  </div>

  <!-- DRILL -->
  <div class="v2-panel active" id="v2-panel-drill" role="tabpanel">
    <div class="sub-tab-bar">
      <button class="v2-subtab active" data-drill="mixed">Review</button>
      <button class="v2-subtab" data-drill="confused">Confusables</button>
    </div>
    <div id="v2-drill-body"></div>
  </div>

  <!-- MOCK -->
  <div class="v2-panel" id="v2-panel-mock" role="tabpanel">
    <div id="v2-mock-body"></div>
  </div>
</div><!-- /#v2-app -->

<script>
window.addEventListener('DOMContentLoaded', function () {
  if (window.v2 && typeof window.v2.onShow === 'function') window.v2.onShow();
});

window.v2 = (function(){
  'use strict';

  // ── Tricky-Term clusters (full member detail) ──────────────────
  var v2Clusters = [
    {id:'eval-gen', name:'Eval metrics — generation', anchor:'BLEU = bi-Lingual = transLation; ROUGE = Recall = summaRy; BERT = meaning; Perplexity = lower is better.',
     members:[
      {name:'BLEU',       what:'N-gram overlap between machine output and reference text.',                           when:'Translation quality (machine translation).',          confused:['ROUGE','BERTScore'], mnemonic:'B-L-EU = bi-Lingual EvaLuation = transLation.'},
      {name:'ROUGE',      what:'Recall-oriented overlap of n-grams / longest common subsequence with reference.',     when:'Summarisation quality (news, abstracts).',            confused:['BLEU','BERTScore'], mnemonic:'R for Recall and summa-R-y.'},
      {name:'BERTScore',  what:'Cosine similarity between embedding vectors of generated vs reference text.',         when:'Paraphrasing / when meaning matters more than exact words.', confused:['ROUGE','BLEU'], mnemonic:'BERT = Bidirectional Encoder = understands meaning, not just words.'},
      {name:'Perplexity', what:'Exponentiated cross-entropy: how surprised the model is by the test text.',           when:'Language-model fluency. LOWER is better — opposite of others.', confused:['BLEU','ROUGE'], mnemonic:'Perplexed = confused. You want a model that is NOT perplexed → low score wins.'}
     ]},
    {id:'eval-cls', name:'Eval metrics — classification / regression', anchor:'Imbalanced classes → F1; ranking → MAP / NDCG; regression with outliers → RMSE.',
     members:[
      {name:'Accuracy',  what:'Correct predictions ÷ total.',                                       when:'Balanced classes only.',                             confused:['F1'],          mnemonic:'Accuracy lies on imbalanced data — 99% accurate by predicting "not fraud".'},
      {name:'F1 Score',  what:'Harmonic mean of precision and recall.',                             when:'Imbalanced classes (fraud, disease).',               confused:['Accuracy'],    mnemonic:'Punishes either precision OR recall being low — neither can be ignored.'},
      {name:'AUC-ROC',   what:'Area under TPR-vs-FPR curve across all thresholds.',                 when:'Threshold-free classifier comparison.',              confused:['F1'],          mnemonic:'0.5 = coin flip, 1.0 = perfect separation across every threshold.'},
      {name:'MAP',       what:'Mean Average Precision across queries.',                             when:'Information retrieval / ranking quality.',           confused:['NDCG'],        mnemonic:'Average rank-position quality across many search queries.'},
      {name:'NDCG',      what:'Normalised Discounted Cumulative Gain (rank-position-weighted).',    when:'Recommender systems where item ORDER matters.',      confused:['MAP'],         mnemonic:'NDCG cares WHERE in the list the right item lands; top spots count more.'},
      {name:'MAE',       what:'Mean Absolute Error.',                                               when:'Regression where outliers should not dominate.',     confused:['RMSE'],        mnemonic:'Absolute = treat all errors equally. Forgiving of outliers.'},
      {name:'RMSE',      what:'Root Mean Squared Error — squares before averaging.',                when:'Regression where large errors are extra-bad.',       confused:['MAE'],         mnemonic:'Squared = penalise big mistakes. Punishing of outliers.'},
      {name:'MAPE',      what:'Mean Absolute Percentage Error.',                                    when:'When you want error as a % of actual values.',       confused:['MAE','RMSE'],  mnemonic:'Relative error — best when items differ wildly in scale (price of a house vs a coffee).'}
     ]},
    {id:'k-cluster', name:'The "K-" cluster (different problems!)', anchor:'K-NN classifies (supervised); K-Means clusters (unsupervised); K-Fold splits data; Top-K caps LLM vocabulary.',
     members:[
      {name:'K-NN',           what:'K-Nearest Neighbours — supervised classification by majority vote of K closest training examples.', when:'Simple classification with small datasets.', confused:['K-Means'],    mnemonic:'NN = Nearest Neighbours. Asks the K closest data points "what class are you?"'},
      {name:'K-Means',        what:'Unsupervised clustering: partition data into K groups around K centroids.',                          when:'Customer segmentation, market discovery.',    confused:['K-NN'],       mnemonic:'Means = averages. Each cluster is centred on the mean of its members.'},
      {name:'K-Fold CV',      what:'Cross-validation: split data into K folds, train on K-1, validate on 1, rotate.',                    when:'Reliable model evaluation on small data.',    confused:['K-NN','K-Means'], mnemonic:'Fold = data split. Has nothing to do with neighbours or centroids.'},
      {name:'Top-K sampling', what:'LLM decoding: at each step, sample only from the K most likely next tokens.',                        when:'Tuning LLM output diversity.',                confused:['Top-P'],     mnemonic:'Top-K = "limit the vocabulary to the K best candidates". Top-P does it by probability mass instead.'}
     ]},
    {id:'attention', name:'Attention family', anchor:'Self = same sequence; Cross = encoder→decoder; Multi-head = several lenses in parallel.',
     members:[
      {name:'Attention',         what:'Mechanism letting a model weight different parts of the input as it produces each output token.', when:'Foundational concept of transformers.',     confused:['Self-attention'],        mnemonic:'Pay attention to what matters NOW for the token I am generating.'},
      {name:'Self-attention',    what:'Each position attends to ALL positions in the SAME sequence.',                                     when:'Encoder layers — building context.',          confused:['Cross-attention'],       mnemonic:'Self = looks at itself (one sequence, all positions).'},
      {name:'Cross-attention',   what:'Decoder positions attend to encoder outputs (different sequence).',                               when:'Encoder-decoder seq2seq (translation).',     confused:['Self-attention'],        mnemonic:'Cross = crosses from one sequence (encoder) to another (decoder).'},
      {name:'Multi-head',        what:'Run attention several times in parallel with different learned projections, then concatenate.',   when:'Capturing different relationships at once.', confused:['Self-attention'],        mnemonic:'Many heads = many points of view in the same layer.'}
     ]},
    {id:'transformer-parts', name:'Transformer parts', anchor:'BERT = encoder-only (understanding); GPT = decoder-only (generation); T5 = encoder-decoder (seq2seq).',
     members:[
      {name:'Encoder',         what:'Reads input and produces contextual embeddings.',                              when:'Understanding tasks (classification, NER, embeddings).', confused:['Decoder'],      mnemonic:'Encoder = takes IN, makes meaning. BERT-only.'},
      {name:'Decoder',         what:'Generates output one token at a time, auto-regressively.',                     when:'Generation tasks (chat, completion).',                  confused:['Encoder'],      mnemonic:'Decoder = puts OUT. GPT-only.'},
      {name:'Encoder-decoder', what:'Encoder builds meaning, decoder reads it and generates.',                      when:'Seq2seq translation, summarisation (T5, BART).',        confused:['Decoder'],      mnemonic:'Both → seq2seq. T5 is the canonical example.'},
      {name:'Embedding',       what:'A learned vector that represents the meaning of a token / sentence.',          when:'Anywhere similarity between texts is needed.',          confused:['Token'],        mnemonic:'Embedding = numbers that mean something.'},
      {name:'Token',           what:'Sub-word unit the model actually reads (~0.75 word).',                         when:'Counting cost, context limits.',                        confused:['Embedding'],    mnemonic:'Token = the model\'s alphabet, NOT a word.'},
      {name:'Context window',  what:'Max number of tokens the model can hold at once (input + output).',           when:'Choosing a model for long documents.',                  confused:['Token'],        mnemonic:'Window = how much it can SEE at one time.'}
     ]},
    {id:'fm-ladder', name:'FM customisation ladder (cheap → expensive)', anchor:'Prompt < Few-shot < CoT < RAG < Fine-tune < Continuous PT < RLHF.',
     members:[
      {name:'Prompt eng',        what:'Improve instructions only — no examples, no training.',                          when:'Quickest first attempt; almost free.',                       confused:['Few-shot'],         mnemonic:'Just words — no training, no examples.'},
      {name:'Few-shot prompting',what:'Include 2–5 input/output examples in the prompt.',                              when:'You can describe the format with examples.',                 confused:['Fine-tune'],        mnemonic:'A few examples in the prompt itself; weights unchanged.'},
      {name:'CoT (Chain-of-Thought)', what:'Tell the model to "think step by step" — improves reasoning.',           when:'Multi-step reasoning problems.',                              confused:['Few-shot'],         mnemonic:'Show your working = better answers.'},
      {name:'RAG',               what:'Retrieve external documents at query time and inject into the prompt.',         when:'Fresh / private data, citations needed.',                    confused:['Fine-tune'],        mnemonic:'Retrieval-Augmented Generation. Knowledge OUTSIDE the model.'},
      {name:'Fine-tune',         what:'Continue training on labelled examples to change style / vocabulary.',         when:'Permanent style or domain vocabulary.',                      confused:['RAG'],              mnemonic:'Tune the dial = bake style into the weights.'},
      {name:'Continuous PT',     what:'Continued pre-training on a large *unlabelled* domain corpus.',                when:'Whole new domain (e.g. legal, medical).',                    confused:['Fine-tune'],        mnemonic:'PT = Pre-Training, but extended into your domain.'},
      {name:'RLHF',              what:'Reinforcement Learning from Human Feedback — humans rank outputs, model learns preference.', when:'Aligning behaviour with values.',                  confused:['Fine-tune'],        mnemonic:'Human raters teach the model what "good" looks like.'}
     ]},
    {id:'bedrock', name:'Bedrock feature family', anchor:'KB = retrieve; Agents = act; Guardrails = block; DA = extract; PT = reserve; OD = pay-per-token.',
     members:[
      {name:'Knowledge Bases',     what:'Managed RAG — chunk, embed, store, retrieve from your data sources.',           when:'FM needs to answer from your private documents.',     confused:['Agents'],     mnemonic:'KB = a librarian for the FM.'},
      {name:'Agents',              what:'Autonomous multi-step task execution — plan, call APIs, take actions.',         when:'AI must DO something (book, query, update).',         confused:['Knowledge Bases'], mnemonic:'Agents ACT; KB only retrieves.'},
      {name:'Guardrails',          what:'Configurable content controls — block topics, redact PII, prevent injections.', when:'Safety / compliance content rules.',                  confused:['IAM'],        mnemonic:'Guardrails control WHAT the model says; IAM controls WHO can call it.'},
      {name:'Data Automation',     what:'Extract structured data from documents, audio, images, video at scale.',       when:'Multimodal unstructured content pipelines.',          confused:['Textract'],   mnemonic:'DA = robot that reads everything and returns JSON.'},
      {name:'Provisioned Throughput', what:'Reserve dedicated capacity for a chosen FM, paid per hour.',                 when:'High steady QPS, latency-SLA workloads.',             confused:['On-demand'],  mnemonic:'Provisioned = reserved seats. Pay even when idle.'},
      {name:'On-demand',           what:'Pay per input + output token, no commitment.',                                  when:'Variable / unpredictable usage.',                     confused:['Provisioned Throughput'], mnemonic:'On-demand = pay-as-you-go. Flexible, no SLA.'}
     ]},
    {id:'q-family', name:'Amazon Q family', anchor:'Developer = code; Business = enterprise knowledge; Apps = self-serve mini-apps; QuickSight = BI dashboards.',
     members:[
      {name:'Q Developer',     what:'GenAI coding assistant in IDEs and AWS Console.',                            when:'Developers writing / debugging AWS code.',          confused:['Q Business'],  mnemonic:'Developer = sits beside you in your IDE.'},
      {name:'Q Business',      what:'Enterprise GenAI assistant connected to internal docs and systems.',         when:'Employees asking about company data / policies.',  confused:['Q Developer'], mnemonic:'Business = corporate Wikipedia bot.'},

    q('D3','T3.2','scenario','fm-ladder',

      'Frequently changing private docs + need citations → RAG.'),
    q('D3','T3.3','scenario','fm-ladder',
      'A hospital wants its AI assistant to consistently use precise clinical terminology and the SOAP-note documentation format in every reply, even without prompt engineering. RAG alone has not solved this. Which approach is BEST?',

      ['BLEU','ROUGE','BERTScore','Perplexity'],

      'ROUGE is purpose-built for summarisation — it measures overlap (recall) of n-grams and longest common subsequences against reference summaries. BLEU is for translation. BERTScore measures semantic similarity (useful when paraphrase variation matters). Perplexity measures language-model confidence, not summary content.',
      'Summarisation → ROUGE (R for Recall + summaRy).'),
    q('D3','T3.4','scenario','eval-gen',

      ['ROUGE','BLEU','Accuracy','Perplexity'],

      'Translation → BLEU (Bi-Lingual EvaLuation).'),
    q('D3','T3.4','scenario','eval-gen',

      'Meaning matters more than exact words → BERTScore.'),
    q('D3','T3.4','scenario','eval-gen',

      'Perplexity: LOWER is better (opposite of ROUGE/BLEU/BERTScore).'),

    {letter:'F', subtitle:'family — metric vs model vs technique',
     mnemonic:'F1 balances Precision + Recall. FM = Foundation Model (huge, pre-trained). Fine-tune = bake into weights. Few-shot = examples IN the prompt.',
     rows:[
      {term:'F1 score',    domain:'Eval metric · D1',       cue:'Question describes IMBALANCED classification (fraud, disease, rare class) where accuracy would lie. Need to balance precision & recall.',           distractor:'Accuracy (lies on imbalanced data)'},
      {term:'FM',          domain:'GenAI concept · D2',     cue:'Question references a LARGE pre-trained model adaptable to many tasks via prompting or fine-tuning — i.e. a foundation model.',                     distractor:'Classical ML model (task-specific, not adaptable)'},
      {term:'Fine-tuning', domain:'Customisation · D3',     cue:'Question wants PERMANENT change to model output style, vocabulary, or format — even when you remove your prompt instructions.',                      distractor:'RAG (adds knowledge, not style)'},
      {term:'Few-shot',    domain:'Prompting · D3',         cue:'Question describes adding 2–5 worked input/output examples to the prompt itself (no training, no weight changes).',                                  distractor:'Fine-tune (training-time, modifies weights)'},
      {term:'Forecast',    domain:'AWS service · D1',       cue:'Question wants a MANAGED time-series prediction API (demand, sales) for a team without ML expertise.',                                                distractor:'SageMaker DeepAR (you write the code)'}
     ]}
  ];

  // expose to window for DevTools introspection during authoring
  window.v2Flashcards    = v2Flashcards;
  window.v2Questions     = v2Questions;
  window.v2ConfusedPairs = v2ConfusedPairs;
  window.v2DecisionTrees = v2DecisionTrees;
  window.v2Clusters      = v2Clusters;
  window.v2LetterSoup    = v2LetterSoup;

  // ── localStorage helper ────────────────────────────────────────
  var NS = 'aifc01.v2.';
  var store = {
    get: function(key, def){
      try { var raw = localStorage.getItem(NS + key); return raw == null ? def : JSON.parse(raw); }
      catch(e){ return def; }
    },
    set: function(key, val){
      try { localStorage.setItem(NS + key, JSON.stringify(val)); } catch(e) {}
    },
    del: function(key){ try { localStorage.removeItem(NS + key); } catch(e) {} }
  };

  // ── runtime state ──────────────────────────────────────────────
  var state = {
    currentTab: (function(){
      var t = store.get('lastTab', 'drill');
      // 'cram' was removed — old persisted state lands on Drill instead.
      return (t === 'study' || t === 'drill' || t === 'mock') ? t : 'drill';
    })(),
    currentStudySub: store.get('lastStudySub', 'd1'),
    currentDrillMode: (function(){
      var m = store.get('drillMode', 'mixed');
      // 'fc' / 'q' / 'tricky' / 'cluster' were removed — fold to a surviving mode.
      if (m === 'mixed' || m === 'confused') return m;
      if (m === 'cluster') return 'confused'; // cluster drill merged into confusables
      return 'mixed';
    })(),
    drillDomain: store.get('drillDomain', 'all'),
    referenceView: store.get('referenceView', 'trees'),
    cramChecks: store.get('cramChecks', {}),
    srs: store.get('srs', {}),
    mockHistory: store.get('mockHistory', []),
    mock: null,            // active mock run (in-memory only — not persisted)
    drillItem: null,
    drillPreview: null,    // anchor like 'q:N' or 'fc:N' — render that exact item w/o touching SRS
    currentClusterDetail: null
  };

  // ── SRS engine — Leitner 5 boxes ───────────────────────────────
  var BOX_INTERVALS_MS = [0, 86400000, 3*86400000, 7*86400000, 14*86400000];

  function srsKey(kind, id){ return kind + ':' + id; }

  function srsGet(itemId){
    return state.srs[itemId] || { box: 0, dueAt: 0, lastSeen: 0, correctStreak: 0, history: [] };
  }

  function srsRecord(itemId, result){
    var e = srsGet(itemId);
    var now = Date.now();
    if (result === 'correct') {
      e.box = Math.min(4, e.box + 1);
      e.correctStreak = (e.correctStreak || 0) + 1;
    } else if (result === 'unsure') {
      // half-step back: stay or drop one box
      e.box = Math.max(0, e.box - 1);
      e.correctStreak = 0;
    } else { // 'wrong'
      e.box = 0;
      e.correctStreak = 0;
    }
    e.lastSeen = now;
    e.dueAt = now + BOX_INTERVALS_MS[e.box];
    e.history = (e.history || []).concat([{at: now, result: result}]).slice(-20);
    state.srs[itemId] = e;
    store.set('srs', state.srs);
  }

  function srsDueIds(filterFn){
    var now = Date.now();
    var out = [];
    function consider(id){
      var e = state.srs[id];
      var due = e ? e.dueAt : 0;
      if (due <= now && (!filterFn || filterFn(id))) out.push({id:id, dueAt: due});
    }
    v2Flashcards.forEach(function(_, i){ consider(srsKey('fc', i)); });
    v2Questions.forEach(function(_, i){ consider(srsKey('q', i)); });
    out.sort(function(a,b){ return a.dueAt - b.dueAt; });
    return out.map(function(x){ return x.id; });
  }

  // ── search index + ranker ──────────────────────────────────────
  var searchIndex = [];

  function buildSearchIndex(){
    searchIndex = [];
    // flashcards
    v2Flashcards.forEach(function(f, i){
      searchIndex.push({kind:'flashcard', text: f.front, sub: f.back || '', anchor: 'fc:'+i, weight: 1.0});
      if (f.mnemonic) searchIndex.push({kind:'mnemonic', text: f.mnemonic, sub: f.front, anchor: 'fc:'+i, weight: 0.9});
    });
    // questions
    v2Questions.forEach(function(q, i){
      searchIndex.push({kind:'question', text: q.q || q.stem || '', sub: (q.exp||''), anchor: 'q:'+i, weight: 1.0});
      (q.opts||[]).forEach(function(o){
        searchIndex.push({kind:'option', text: o, sub: q.q || '', anchor: 'q:'+i, weight: 0.6});
      });
    });
    // confused pairs
    v2ConfusedPairs.forEach(function(p, i){
      searchIndex.push({kind:'confused-pair', text: (p.cue||'') + ' → ' + (p.right||''), sub: p.distinction || '', anchor: 'cp:'+i, weight: 1.0});
    });
    // clusters
    v2Clusters.forEach(function(c, i){
      var memberNames = (c.members||[]).map(function(m){ return m.name; });
      searchIndex.push({kind:'cluster', text: c.name, sub: memberNames.join(' · '), anchor: 'cl:'+c.id, weight: 1.0});
      (c.members||[]).forEach(function(m){
        searchIndex.push({kind:'cluster-member', text: m.name, sub: (m.what||'') + ' · ' + c.name, anchor: 'cl:'+c.id, weight: 0.8});
      });
    });
    // letter soup
    v2LetterSoup.forEach(function(g){
      g.rows.forEach(function(r){
        searchIndex.push({kind:'letter-soup', text: r.term, sub: r.cue + ' · ' + r.domain, anchor: 'ls:'+g.letter, weight: 0.9});
      });
    });
    // decision trees (cheat sheets)
    v2DecisionTrees.forEach(function(t, i){
      searchIndex.push({kind:'cheat-sheet', text: t.title, sub: '', anchor: 'ct:'+i, weight: 1.0});
      (t.branches||[]).forEach(function(b){
        searchIndex.push({kind:'cheat-branch', text: b.then, sub: b.if, anchor: 'ct:'+i, weight: 0.7});
        searchIndex.push({kind:'cheat-branch', text: b.if,   sub: b.then, anchor: 'ct:'+i, weight: 0.7});
      });
    });
  }

  function searchRank(q){
    if (!q || q.length < 2) return [];
    var ql = q.toLowerCase();
    var seen = {}, out = [];
    searchIndex.forEach(function(e){
      var tl = e.text.toLowerCase(), sl = (e.sub||'').toLowerCase(), sc = 0;
      if (tl === ql) sc = 100;
      else if (tl.indexOf(ql) === 0) sc = 60;
      else if (tl.indexOf(ql) > -1) sc = 40;
      else if (sl.indexOf(ql) > -1) sc = 15;
      if (sc === 0) return;
      sc = sc * (e.weight || 1);
      var key = e.anchor + '|' + e.kind;
      if (seen[key] && seen[key] >= sc) return;
      seen[key] = sc;
      out.push({entry: e, score: sc});
    });
    out.sort(function(a,b){ return b.score - a.score; });
    // dedup by anchor (keep highest)
    var byAnchor = {};
    var dedup = [];
    out.forEach(function(r){
      if (byAnchor[r.entry.anchor]) return;
      byAnchor[r.entry.anchor] = true;
      dedup.push(r);
    });
    return dedup.slice(0, 12);
  }

  function pulseHighlight(anchor){
    var el = document.querySelector('#v2-app [data-anchor="'+anchor+'"]');
    if (!el) return false;
    // If the target is a collapsible flashcard, expand it so the user lands on visible content
    if (el.tagName === 'DETAILS') el.open = true;
    try { el.scrollIntoView({behavior:'smooth', block:'center'}); }
    catch(e){ el.scrollIntoView(); }
    el.classList.remove('v2-search-target');
    void el.offsetWidth; // force reflow so animation re-triggers
    el.classList.add('v2-search-target');
    setTimeout(function(){ el.classList.remove('v2-search-target'); }, 1700);
    return true;
  }

  function pulseAfterRender(anchor){
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){ pulseHighlight(anchor); });
    });
  }

  function jumpTo(entry){
    // anchor format: 'fc:N' | 'q:N' | 'cp:N' | 'cl:ID' | 'ct:N'
    var a = entry.anchor || '';
    if (a.indexOf('fc:') === 0) {
      var fcIdx = parseInt(a.slice(3), 10);
      var f = v2Flashcards[fcIdx];
      var sub = (f && f.domain) ? String(f.domain).toLowerCase() : 'd1';
      showTab('study'); showStudySub(sub);
      pulseAfterRender(a);
    } else if (a.indexOf('q:') === 0) {
      state.drillPreview = a;
      showTab('drill');
    } else if (a.indexOf('cp:') === 0) {
      // Confused-pair anchor → jump to the relevant domain page (pairs live there now)
      var cpIdx = parseInt(a.slice(3), 10);
      var pp = v2ConfusedPairs[cpIdx];
      var domSub = (pp && (pp.domains||[])[0]) ? String(pp.domains[0]).toLowerCase() : 'd1';
      showTab('study'); showStudySub(domSub);
      pulseAfterRender(a);
    } else if (a.indexOf('cl:') === 0) {
      state.currentClusterDetail = a.slice(3);
      state.referenceView = 'clusters'; store.set('referenceView','clusters');
      showTab('study'); showStudySub('cheat');
    } else if (a.indexOf('ct:') === 0) {
      state.referenceView = 'trees'; store.set('referenceView','trees');
      showTab('study'); showStudySub('cheat');
      pulseAfterRender(a);
    } else if (a.indexOf('ls:') === 0) {
      var letter = a.slice(3);
      v2LetterSoup.forEach(function(g){ if (g.letter === letter) g.expanded = true; });
      state.referenceView = 'letters'; store.set('referenceView','letters');
      showTab('study'); showStudySub('cheat');
      pulseAfterRender(a);
    }
    closeSearch();
  }

  function closeSearch(){
    var box = document.getElementById('v2-search-results');
    if (box) box.hidden = true;
  }

  function renderSearchResults(q){
    var box = document.getElementById('v2-search-results');
    if (!box) return;
    var results = searchRank(q);
    if (!results.length) { box.hidden = true; return; }
    box.innerHTML = results.map(function(r, i){
      var t = escapeHtml(r.entry.text);
      var ql = q.toLowerCase();
      var tl = r.entry.text.toLowerCase();
      var idx = tl.indexOf(ql);
      if (idx > -1) {
        t = escapeHtml(r.entry.text.slice(0, idx)) + '<mark>' + escapeHtml(r.entry.text.slice(idx, idx + q.length)) + '</mark>' + escapeHtml(r.entry.text.slice(idx + q.length));
      }
      return '<div class="v2-sr-item" data-idx="'+i+'" tabindex="0"><div class="v2-sr-kind">'+r.entry.kind+'</div><div class="v2-sr-text">'+t+'</div></div>';
    }).join('');
    Array.prototype.forEach.call(box.querySelectorAll('.v2-sr-item'), function(el){
      el.addEventListener('click', function(){
        var idx = parseInt(el.dataset.idx, 10);
        jumpTo(results[idx].entry);
      });
    });
    box.hidden = false;
  }

  function escapeHtml(s){
    return String(s||'').replace(/[&<>"]/g, function(c){
      return c==='&'?'&amp;':c==='<'?'&lt;':c==='>'?'&gt;':'&quot;';
    });
  }

  // ── tab routing ────────────────────────────────────────────────
  function showTab(t){
    state.currentTab = t;
    store.set('lastTab', t);
    Array.prototype.forEach.call(document.querySelectorAll('#v2-app .v2-tab'), function(b){
      b.classList.toggle('active', b.dataset.tab === t);
    });
    Array.prototype.forEach.call(document.querySelectorAll('#v2-app .v2-panel'), function(p){
      p.classList.toggle('active', p.id === 'v2-panel-' + t);
    });
    if (t === 'study') showStudySub(state.currentStudySub || 'd1');
    if (t === 'drill')    {
      // sync active sub-tab to persisted drill mode
      Array.prototype.forEach.call(document.querySelectorAll('#v2-panel-drill .v2-subtab'), function(b){
        b.classList.toggle('active', b.dataset.drill === state.currentDrillMode);
      });
      renderDrill();
    }
    if (t === 'mock')     renderMock();
  }

  function showStudySub(sub){
    state.currentStudySub = sub;
    store.set('lastStudySub', sub);
    Array.prototype.forEach.call(document.querySelectorAll('#v2-panel-study .v2-subtab'), function(b){
      b.classList.toggle('active', b.dataset.sub === sub);
    });
    renderStudy();
  }

  // ── renderers ──────────────────────────────────────────────────
  var DOMAIN_LABELS = {
    d1:{title:'Domain 1 — AI/ML Fundamentals',pct:'20%',color:'#34d399',tasks:['T1.1 Basic AI/ML concepts','T1.2 Practical use cases','T1.3 ML development lifecycle']},
    d2:{title:'Domain 2 — Generative AI',pct:'24%',color:'#a78bfa',tasks:['T2.1 GenAI concepts','T2.2 Capabilities & limitations','T2.3 AWS infrastructure for GenAI']},
    d3:{title:'Domain 3 — Foundation Models',pct:'28%',color:'#fbbf24',tasks:['T3.1 Design considerations','T3.2 Prompt engineering','T3.3 Training & fine-tuning','T3.4 Evaluation']},
    d4:{title:'Domain 4 — Responsible AI',pct:'14%',color:'#f87171',tasks:['T4.1 Principles','T4.2 Transparency & fairness','T4.3 Tooling']},
    d5:{title:'Domain 5 — Security & Governance',pct:'14%',color:'#4f9eff',tasks:['T5.1 Securing AI systems','T5.2 Governance & compliance','T5.3 Data governance','T5.4 GenAI-specific gov']}
  };

  function renderStudy(){
    var body = document.getElementById('v2-study-body');
    if (!body) return;
    var sub = state.currentStudySub;

    // Back-compat: old persisted sub-ids redirect to the unified Reference panel.
    if (sub === 'tricky'  || sub === 'letters' || sub === 'confusables' || sub === 'pairs') {
      var view = (sub === 'tricky') ? 'clusters' : (sub === 'letters' ? 'letters' : (sub === 'pairs' ? 'pairs' : 'trees'));
      // 'pairs' has no view in Reference — pairs live on domain pages now. Default to D3 (heaviest).
      if (view === 'pairs') { state.currentStudySub = 'd3'; store.set('lastStudySub','d3'); syncStudySubActive(); return renderDomain(body, 'd3'); }
      state.referenceView = view; store.set('referenceView', view);
      state.currentStudySub = 'cheat'; store.set('lastStudySub','cheat');
      sub = 'cheat'; syncStudySubActive();
    }
    if (sub === 'cheat')   return renderReference(body);
    if (DOMAIN_LABELS[sub]) return renderDomain(body, sub);

    body.innerHTML = '<div class="v2-empty">Unknown sub-tab.</div>';
  }

  function renderDomain(body, sub){
    var d = DOMAIN_LABELS[sub];
    var domainKey = sub.toUpperCase();
    var cards = v2Flashcards.filter(function(f){ return f.domain === domainKey && f.cat === 'concept'; });
    var serviceCards = v2Flashcards.filter(function(f){ return f.domain === domainKey && f.cat === 'service'; });
    var pairs = v2ConfusedPairs.filter(function(p){ return (p.domains||[]).indexOf(domainKey) > -1; });

    var html = '<div class="v2-h" style="border-left:3px solid '+d.color+';padding-left:10px">'
      + escapeHtml(d.title) + ' <span class="v2-pct">'+d.pct+'</span></div>'
      + '<div class="v2-meta">' + d.tasks.join(' · ') + '</div>';

    if (cards.length) {
      html += '<div class="v2-h" style="margin-top:18px;font-size:12px;color:var(--muted)">Concept cards</div>';
      html += cards.map(function(f){ return renderConceptCard(f, v2Flashcards.indexOf(f)); }).join('');
    }
    if (serviceCards.length) {
      html += '<div class="v2-h" style="margin-top:18px;font-size:12px;color:var(--muted)">Services</div>';
      html += serviceCards.map(function(f){ return renderConceptCard(f, v2Flashcards.indexOf(f)); }).join('');
    }
    if (pairs.length) {
      html += '<div class="v2-h" style="margin-top:18px;font-size:12px;color:var(--muted)">Confused pairs in this domain</div>';
      html += renderPairsTable(pairs);
    }
    if (!cards.length && !serviceCards.length && !pairs.length) {
      html += '<div class="v2-empty"><strong>No content for this domain yet.</strong>Open a populated domain or the Tricky Terms tab.</div>';
    }
    body.innerHTML = html;
  }

  function renderConceptCard(f, idx){
    var clusterTag = f.cluster ? '<span class="v2-fc-tag" style="position:static;font-size:10px;margin-left:6px;flex-shrink:0">'+escapeHtml(f.cluster)+'</span>' : '';
    var anchorAttr = (typeof idx === 'number' && idx >= 0) ? ' data-anchor="fc:'+idx+'"' : '';
    return '<details class="v2-card v2-fc-collapse'+(f.cluster?' cluster-tagged':'')+'"'+anchorAttr+'>'
      + '<summary style="cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px">'
        + '<span class="v2-fc-caret" style="color:var(--muted);font-size:11px;flex-shrink:0">▸</span>'
        + '<span style="flex:1;line-height:1.5">'+escapeHtml(f.front)+'</span>'
        + clusterTag
      + '</summary>'
      + '<div style="font-size:12px;color:#bcc6d4;line-height:1.65;padding-top:10px;margin-left:19px">'+escapeHtml(f.back)+'</div>'
      + (f.mnemonic ? '<div class="mnemonic-line" style="margin-left:19px"><strong>Mnemonic:</strong> '+escapeHtml(f.mnemonic)+'</div>' : '')
      + (f.trigger ? '<div class="trigger-line" style="margin-left:19px"><strong>Exam trigger:</strong> '+escapeHtml(f.trigger)+'</div>' : '')
      + '</details>';
  }

  function renderPairsTable(pairs){
    var rows = pairs.map(function(p){
      var idx = v2ConfusedPairs.indexOf(p);
      var anchorAttr = idx >= 0 ? ' data-anchor="cp:'+idx+'"' : '';
      return '<tr'+anchorAttr+'><td>'+escapeHtml(p.cue)+'</td><td><em>'+escapeHtml(p.wrong)+'</em></td><td><strong>'+escapeHtml(p.right)+'</strong></td><td>'+escapeHtml(p.distinction)+'</td></tr>';
    }).join('');
    return '<div class="compare-wrap" style="border:0.5px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:14px"><table class="compare-table" style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr><th>Scenario cue</th><th>Wrong answer</th><th>Right answer</th><th>Why</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }

  function renderConfusedPairs(body){
    if (!v2ConfusedPairs.length) {
      body.innerHTML = '<div class="v2-h">Confused Pairs</div><div class="v2-empty">Pairs will appear here once authored.</div>';
      return;
    }
    var byTheme = {};
    v2ConfusedPairs.forEach(function(p){
      var k = p.themeName || p.theme || 'Other';
      (byTheme[k] = byTheme[k] || []).push(p);
    });
    var html = '<div class="v2-h">Confused Pairs <span class="v2-pct">'+v2ConfusedPairs.length+' rows</span></div>'
      + '<div class="v2-meta">When the exam stem contains the cue keyword on the left, the *right* column is the answer. The middle column is the trap.</div>';

  // ── Cram landing — weak spots, quick launches, 2-day checklist ─
  function cramWeakSpots(){
    // Score each SRS item by recent-wrong rate. Higher = weaker.
    var out = [];
    Object.keys(state.srs || {}).forEach(function(id){
      var e = state.srs[id]; if (!e || !e.history || !e.history.length) return;
      var recent = e.history.slice(-5);
      var wrongs = recent.filter(function(h){ return h.result === 'wrong'; }).length;
      var unsures = recent.filter(function(h){ return h.result === 'unsure'; }).length;
      var score = (wrongs * 2 + unsures) / recent.length; // 0..2
      if (wrongs === 0 && unsures === 0) return;
      var label = '', domain = '';
      if (id.indexOf('fc:') === 0) {
        var f = v2Flashcards[parseInt(id.slice(3),10)];
        if (!f) return; label = f.front; domain = f.domain || '';
      } else if (id.indexOf('q:') === 0) {
        var qq = v2Questions[parseInt(id.slice(2),10)];
        if (!qq) return; label = (qq.q || '').slice(0, 90) + ((qq.q||'').length > 90 ? '…' : ''); domain = qq.domain || '';
      } else if (id.indexOf('cp:') === 0) {
        var pp = v2ConfusedPairs[parseInt(id.slice(3),10)];
        if (!pp) return; label = pp.themeName + ' — ' + pp.cue; domain = (pp.domains||[])[0] || '';
      } else if (id.indexOf('cl:') === 0) {
        var rest = id.slice(3); var lc = rest.lastIndexOf(':');
        var cid = rest.slice(0, lc); var mi = parseInt(rest.slice(lc+1),10);
        var c = v2Clusters.filter(function(x){return x.id===cid;})[0];
        if (!c) return;
        var mm = (c.members||[])[mi]; if (!mm) return;
        label = c.name + ' — ' + mm.name; domain = '';
      } else { return; }
      out.push({id:id, label:label, domain:domain, score:score, wrongs:wrongs, unsures:unsures, n:recent.length});
    });
    out.sort(function(a,b){ return b.score - a.score; });
    return out.slice(0, 3);
  }

  // memoized synthesized questions for confusables / cluster decoder so the
  // same drill ID always produces the same stem + options (deterministic SRS).
  var _synthCache = {};

  function synthConfusableQ(cpIdx){
    var key = 'cp:' + cpIdx;
    if (_synthCache[key]) return _synthCache[key];
    var p = v2ConfusedPairs[cpIdx];
    if (!p) return null;
    var sameTheme = v2ConfusedPairs.filter(function(other, i){ return i !== cpIdx && other.theme === p.theme; });
    var rights = sameTheme.map(function(o){ return o.right; });
    var wrongs = sameTheme.map(function(o){ return o.wrong; });
    var seen = {}; seen[p.right] = 1; seen[p.wrong] = 1;
    var distractors = [];
    rights.concat(wrongs).forEach(function(x){ if (!seen[x]) { seen[x] = 1; distractors.push(x); } });
    distractors = distractors.slice(0, 2);
    var opts = [p.right, p.wrong].concat(distractors);
    // deterministic shuffle: rotate by cpIdx
    var rot = cpIdx % opts.length;
    var shuffled = opts.slice(rot).concat(opts.slice(0, rot));
    var ansIdx = shuffled.indexOf(p.right);
    var domain = (p.domains && p.domains[0]) || '';
    _synthCache[key] = {
      domain: domain,
      task: p.themeName || ('Theme ' + p.theme),
      type: 'scenario',
      cluster: '',
      q: 'Scenario cue: "' + p.cue + '". Which concept applies?',
      opts: shuffled,
      ans: ansIdx,
      exp: p.distinction + (p.wrong ? '  Don\'t confuse with: ' + p.wrong + '.' : ''),
      trigger: ''
    };
    return _synthCache[key];
  }

  function synthClusterQ(cid, midx){
    var key = 'cl:' + cid + ':' + midx;
    if (_synthCache[key]) return _synthCache[key];
    var c = v2Clusters.filter(function(x){ return x.id === cid; })[0];
    if (!c) return null;
    var members = c.members || [];
    var m = members[midx];
    if (!m) return null;
    var others = members.filter(function(_, i){ return i !== midx; }).map(function(x){ return x.name; });
    var pickN = Math.min(3, others.length);
    var rot = midx % Math.max(1, others.length);
    var picked = others.slice(rot).concat(others.slice(0, rot)).slice(0, pickN);
    var opts = [m.name].concat(picked);
    var rot2 = midx % opts.length;
    var shuffled = opts.slice(rot2).concat(opts.slice(0, rot2));
    var ansIdx = shuffled.indexOf(m.name);
    var stem = 'Family: ' + c.name + '. Description: "' + (m.what || '') + '"';
    if (m.when) stem += ' When to use: ' + m.when;
    stem += ' Which family member fits?';
    _synthCache[key] = {
      domain: '',
      task: c.name,
      type: 'scenario',
      cluster: c.id,
      q: stem,
      opts: shuffled,
      ans: ansIdx,
      exp: (m.mnemonic ? 'Mnemonic: ' + m.mnemonic + '  ' : '') + (c.anchor ? 'Cluster anchor: ' + c.anchor : ''),
      trigger: ''
    };
    return _synthCache[key];
  }

  function drillPool(){
    var mode = state.currentDrillMode;
    var ids = [];
    if (mode === 'fc' || mode === 'mixed') v2Flashcards.forEach(function(_, i){ ids.push('fc:' + i); });
    if (mode === 'q'  || mode === 'mixed') v2Questions.forEach(function(_, i){ ids.push('q:' + i); });
    if (mode === 'tricky') {
      var clusterIds = v2Clusters.map(function(c){ return c.id; });
      v2Flashcards.forEach(function(f, i){ if (clusterIds.indexOf(f.cluster) > -1) ids.push('fc:' + i); });
      v2Questions.forEach(function(q, i){ if (clusterIds.indexOf(q.cluster) > -1) ids.push('q:' + i); });
    }
    if (mode === 'confused') {
      // Combined disambiguation pool: confused pairs + cluster members
      v2ConfusedPairs.forEach(function(_, i){ ids.push('cp:' + i); });
      v2Clusters.forEach(function(c){
        (c.members || []).forEach(function(_, mi){ ids.push('cl:' + c.id + ':' + mi); });
      });
    }
    // Domain filter — applies to any item that carries a domain. Cluster
    // items don't have one, so they pass through when mode === 'cluster'.
    var dFilter = state.drillDomain || 'all';
    if (dFilter !== 'all') {
      ids = ids.filter(function(id){
        if (id.indexOf('fc:') === 0) {
          var f = v2Flashcards[parseInt(id.slice(3),10)];
          return f && f.domain === dFilter;
        }
        if (id.indexOf('q:') === 0) {
          var qq = v2Questions[parseInt(id.slice(2),10)];
          return qq && qq.domain === dFilter;
        }
        if (id.indexOf('cp:') === 0) {
          var pp = v2ConfusedPairs[parseInt(id.slice(3),10)];
          return pp && (pp.domains||[]).indexOf(dFilter) > -1;
        }
        // cluster items have no domain — exclude when filter is set
        return false;
      });
    }
    // sort by due first, then unseen
    var now = Date.now();
    var due = [], unseen = [], future = [];
    ids.forEach(function(id){
      var e = state.srs[id];
      if (!e) unseen.push(id);
      else if (e.dueAt <= now) due.push({id:id, dueAt:e.dueAt});
      else future.push({id:id, dueAt:e.dueAt});
    });
    due.sort(function(a,b){ return a.dueAt - b.dueAt; });
    return due.map(function(x){ return x.id; }).concat(unseen);
  }

  function renderDrill(){
    var body = document.getElementById('v2-drill-body');
    if (!body) return;
    if (!v2Flashcards.length && !v2Questions.length) {
      body.innerHTML = '<div class="v2-empty"><strong>No content yet</strong>Drill activates once flashcards and questions are authored.</div>';
      return;
    }
    var todayStrip = renderDrillTodayStrip();
    var checklist = renderDrillChecklist();
    if (state.drillPreview) {
      var pid = state.drillPreview;
      var backBtn = '<button class="v2-btn secondary" id="v2-drill-preview-back" style="margin-bottom:14px">← Back to drill</button>'
        + '<div class="v2-meta" style="margin-bottom:10px">Search preview · this view does not affect SRS scheduling</div>';
      if (pid.indexOf('fc:') === 0) {
        var pf = v2Flashcards[parseInt(pid.slice(3),10)];
        if (pf) {
          body.innerHTML = backBtn + renderFlashcardDrill(pid, pf, true);
          wireFlashcardDrill(pid);
          wireDrillPreviewBack();
          return;
        }
      } else if (pid.indexOf('q:') === 0) {
        var pq = v2Questions[parseInt(pid.slice(2),10)];
        if (pq) {
          body.innerHTML = backBtn + renderQuestionDrill(pid, pq, false, true);
          wireQuestionDrill(pid, pq, true);
          wireDrillPreviewBack();
          return;
        }
      }
      // fallthrough if anchor invalid
      state.drillPreview = null;
    }
    var filterRow = renderDrillFilterRow();
    var pool = drillPool();
    if (!pool.length) {
      body.innerHTML = todayStrip + filterRow + '<div class="v2-empty"><strong>You\'re caught up</strong>'
        + (state.drillDomain && state.drillDomain !== 'all'
            ? 'No items match domain <strong>' + escapeHtml(state.drillDomain) + '</strong> in this mode. Clear the filter or switch mode.'
            : 'No items due in this drill mode. Switch mode or come back later — items are scheduled across 0 / 1 / 3 / 7 / 14 days.')
        + '</div>' + checklist;
      return;
    }
    var nextId = pool[0];
    state.drillItem = nextId;
    var stats = { due: pool.length };
    var modeLabel = ({mixed:'Review', confused:'Confusables'})[state.currentDrillMode] || state.currentDrillMode;
    var meta = todayStrip + filterRow + '<div class="v2-meta">'+stats.due+' item(s) ready · mode: <strong>'+escapeHtml(modeLabel)+'</strong>'
      + (state.drillDomain && state.drillDomain !== 'all' ? ' · domain: <strong>'+escapeHtml(state.drillDomain)+'</strong>' : '')
      + '</div>';
    if (nextId.indexOf('fc:') === 0) {
      var f = v2Flashcards[parseInt(nextId.slice(3),10)];
      body.innerHTML = meta + renderFlashcardDrill(nextId, f) + checklist;
      wireFlashcardDrill(nextId);
    } else if (nextId.indexOf('cp:') === 0) {
      var cpIdx = parseInt(nextId.slice(3), 10);
      var sq = synthConfusableQ(cpIdx);
      if (!sq) { body.innerHTML = '<div class="v2-empty">Confusable not found.</div>'; return; }
      body.innerHTML = meta + renderQuestionDrill(nextId, sq, false) + checklist;
      wireQuestionDrill(nextId, sq);
    } else if (nextId.indexOf('cl:') === 0) {
      var rest = nextId.slice(3);
      var lastColon = rest.lastIndexOf(':');
      var cid = rest.slice(0, lastColon);
      var mi = parseInt(rest.slice(lastColon + 1), 10);
      var sq2 = synthClusterQ(cid, mi);
      if (!sq2) { body.innerHTML = '<div class="v2-empty">Cluster member not found.</div>'; return; }
      body.innerHTML = meta + renderQuestionDrill(nextId, sq2, false) + checklist;
      wireQuestionDrill(nextId, sq2);
    } else {
      var qIdx = parseInt(nextId.slice(2),10);
      var q = v2Questions[qIdx];
      body.innerHTML = meta + renderQuestionDrill(nextId, q, false) + checklist;
      wireQuestionDrill(nextId, q);
    }
  }

  function renderFlashcardDrill(id, f, preview){
    var actions = preview
      ? ''
      : '<div class="v2-fc-actions">'
        + '<button class="v2-btn danger" onclick="v2._rate(\''+id+'\',\'wrong\')">Again</button>'
        + '<button class="v2-btn secondary" onclick="v2._rate(\''+id+'\',\'unsure\')">Hard</button>'
        + '<button class="v2-btn" onclick="v2._rate(\''+id+'\',\'correct\')">Good</button>'
        + '</div>';
    return '<div class="v2-fc"><div class="v2-fc-inner" id="v2-fc-inner">'
      + '<div class="v2-fc-face front"><div class="v2-fc-tag">'+escapeHtml(f.domain||'')+(f.cluster?' · '+escapeHtml(f.cluster):'')+'</div><div class="v2-fc-front-text">'+escapeHtml(f.front)+'</div><div style="text-align:center;font-size:10px;color:var(--muted);margin-top:14px">click to flip</div></div>'
      + '<div class="v2-fc-face back"><div class="v2-fc-back-text">'+escapeHtml(f.back)+(f.mnemonic ? '<div class="mnemonic-line"><strong>Mnemonic:</strong> '+escapeHtml(f.mnemonic)+'</div>' : '')+(f.trigger ? '<div class="trigger-line"><strong>Trigger:</strong> '+escapeHtml(f.trigger)+'</div>' : '')+'</div></div>'
      + '</div></div>'
      + actions;
  }

  function wireFlashcardDrill(id){
    var inner = document.getElementById('v2-fc-inner');
    if (inner) inner.addEventListener('click', function(){ inner.classList.toggle('flipped'); });
  }

  function renderQuestionDrill(id, q, answered, preview){
    var domains = q.domain ? '<span class="v2-fc-tag" style="position:static;margin-right:6px">'+escapeHtml(q.domain)+(q.cluster?' · '+escapeHtml(q.cluster):'')+'</span>' : '';
    var html = '<div style="margin-bottom:10px">'+domains+'<span style="font-size:10px;color:var(--muted)">'+(q.task||'')+'</span></div>'
      + '<div class="v2-q-stem">'+escapeHtml(q.q)+'</div>';
    var ans = q.ans;
    var multi = Array.isArray(ans);
    q.opts.forEach(function(o, i){
      var cls = 'v2-opt';
      if (answered) {
        if (multi ? ans.indexOf(i) > -1 : i === ans) cls += ' correct';
        else cls += '';
      }
      html += '<button class="'+cls+'" data-opt="'+i+'">'+escapeHtml(String.fromCharCode(65+i))+'. '+escapeHtml(o)+'</button>';
    });
    if (answered) {
      html += '<div class="v2-exp">'+escapeHtml(q.exp)+(q.trigger ? '<span class="exam-trigger">Exam trigger: '+escapeHtml(q.trigger)+'</span>' : '')+'</div>';
      if (!preview) {
        html += '<div class="v2-fc-actions" style="margin-top:14px">'
          + '<button class="v2-btn danger" onclick="v2._rate(\''+id+'\',\'wrong\')">Got it wrong</button>'
          + '<button class="v2-btn secondary" onclick="v2._rate(\''+id+'\',\'unsure\')">Lucky guess</button>'
          + '<button class="v2-btn" onclick="v2._rate(\''+id+'\',\'correct\')">Got it right</button>'
          + '</div>';
      }
    }
    return html;
  }

  function wireQuestionDrill(id, q, preview){
    var body = document.getElementById('v2-drill-body');
    if (!body) return;
    var multi = Array.isArray(q.ans);
    var picked = [];
    function previewWrapper(){
      return preview
        ? '<button class="v2-btn secondary" id="v2-drill-preview-back" style="margin-bottom:14px">← Back to drill</button>'
          + '<div class="v2-meta" style="margin-bottom:10px">Search preview · this view does not affect SRS scheduling</div>'
        : '<div class="v2-meta">' + drillPool().length + ' item(s) ready</div>';
    }
    Array.prototype.forEach.call(body.querySelectorAll('.v2-opt'), function(el){
      el.addEventListener('click', function(){
        var idx = parseInt(el.dataset.opt, 10);
        if (multi) {
          if (picked.indexOf(idx) > -1) { picked = picked.filter(function(x){ return x !== idx; }); el.classList.remove('sel'); }
          else { picked.push(idx); el.classList.add('sel'); }
        } else {
          // reveal answer
          Array.prototype.forEach.call(body.querySelectorAll('.v2-opt'), function(o){
            var oi = parseInt(o.dataset.opt, 10);
            if (oi === q.ans) o.classList.add('correct');
            else if (oi === idx) o.classList.add('wrong');
          });
          // re-render with answered=true to show explanation + rate buttons
          body.innerHTML = previewWrapper() + renderQuestionDrill(id, q, true, preview);
          // mark the user's choice as wrong if applicable
          Array.prototype.forEach.call(body.querySelectorAll('.v2-opt'), function(o){
            var oi = parseInt(o.dataset.opt, 10);
            if (oi === q.ans) o.classList.add('correct');
            else if (oi === idx) o.classList.add('wrong');
          });
          if (preview) wireDrillPreviewBack();
        }
      });
    });
    // multi-select: add a Submit
    if (multi) {
      var submit = document.createElement('button');
      submit.className = 'v2-btn';
      submit.style.marginTop = '6px';
      submit.textContent = 'Submit';
      submit.onclick = function(){
        body.innerHTML = previewWrapper() + renderQuestionDrill(id, q, true, preview);
        Array.prototype.forEach.call(body.querySelectorAll('.v2-opt'), function(o){
          var oi = parseInt(o.dataset.opt, 10);
          if (q.ans.indexOf(oi) > -1) o.classList.add('correct');
          else if (picked.indexOf(oi) > -1) o.classList.add('wrong');
        });
        if (preview) wireDrillPreviewBack();
      };
      body.appendChild(submit);
    }
  }

  function wireDrillPreviewBack(){
    var btn = document.getElementById('v2-drill-preview-back');
    if (btn) btn.addEventListener('click', function(){
      state.drillPreview = null;
      renderDrill();
    });
  }

  function _rate(id, result){
    srsRecord(id, result);
    state.drillItem = null;
    renderDrill();
  }

  // ── Mock Exam ──────────────────────────────────────────────────
  var _mockTimer = null;

  function renderMock(){
    var body = document.getElementById('v2-mock-body');
    if (!body) return;
    if (state.mock) { renderMockRunning(); return; }
    var hist = state.mockHistory || [];
    var canStart = v2Questions.length >= 65;
    body.innerHTML = '<div class="v2-h">Mock Exam <span class="v2-pct">65 Q · 90 min</span></div>'
      + '<div class="v2-meta">Real exam format. Domain weights: D1 13 / D2 16 / D3 18 / D4 9 / D5 9. No inline feedback during the run; full review on the scorecard. Refreshing the page abandons the run.</div>'
      + (canStart
          ? '<button class="v2-btn" onclick="v2.startMock()">Start 65-question mock</button>'
          : '<div class="v2-empty"><strong>Bank not full yet</strong>The question bank holds '+v2Questions.length+' / 65+ questions. Mock unlocks once enough domain coverage exists.</div>')
      + (hist.length ? '<div class="v2-h" style="margin-top:24px">Recent attempts</div>' + hist.map(function(h, i){
          var dt = new Date(h.startAt).toLocaleString();
          return '<div class="v2-stat-row"><div class="v2-stat-label">'+dt+'</div><div class="v2-stat-bar"><div style="width:'+h.scorePct+'%"></div></div><div class="v2-stat-val">'+h.scorePct+'% · '+h.correct+'/'+h.total+'</div></div>';
        }).join('') : '');
  }

  function renderMockRunning(){
    var body = document.getElementById('v2-mock-body');
    if (!body || !state.mock) return;
    var m = state.mock;
    if (m.finished) return renderMockScorecard();
    var qIdx = m.ids[m.idx];
    var q = v2Questions[qIdx];
    var picked = m.answers[m.idx];
    var multi = Array.isArray(q.ans);
    var pct = Math.round((m.idx) / m.ids.length * 100);
    var remaining = Math.max(0, m.deadlineAt - Date.now());
    var mm = Math.floor(remaining / 60000), ss = Math.floor((remaining % 60000) / 1000);
    var timerCls = remaining < 5*60000 ? 'crit' : remaining < 15*60000 ? 'warn' : '';
    body.innerHTML = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
      + '<div style="font-size:12px;font-weight:600">Q '+(m.idx+1)+' / '+m.ids.length+'</div>'
      + '<div style="flex:1"></div>'
      + '<div class="timer '+timerCls+'" id="v2-mock-timer">'+(mm<10?'0':'')+mm+':'+(ss<10?'0':'')+ss+'</div>'
      + '<button class="v2-btn secondary" onclick="v2._mockSubmit()">Review &amp; submit</button>'
      + '</div>'
      + '<div class="progress-bar"><div style="width:'+pct+'%"></div></div>'
      + '<div class="v2-q-stem">'+escapeHtml(q.q)+'</div>';
    q.opts.forEach(function(o, i){
      var sel = false;
      if (multi && Array.isArray(picked)) sel = picked.indexOf(i) > -1;
      else if (!multi && typeof picked === 'number') sel = picked === i;
      body.innerHTML += '';   // placeholder, real construction below
    });
    // rebuild options with proper handlers
    var opts = q.opts.map(function(o, i){
      var sel = false;
      if (multi && Array.isArray(picked)) sel = picked.indexOf(i) > -1;
      else if (!multi && typeof picked === 'number') sel = picked === i;
      return '<button class="v2-opt'+(sel?' sel':'')+'" data-opt="'+i+'">'+escapeHtml(String.fromCharCode(65+i))+'. '+escapeHtml(o)+'</button>';
    }).join('');
    body.querySelector('.v2-q-stem').insertAdjacentHTML('afterend', opts + '<div style="display:flex;gap:8px;margin-top:14px"><button class="v2-btn secondary" '+(m.idx===0?'disabled':'')+' onclick="v2._mockNav(-1)">← Prev</button><button class="v2-btn secondary" onclick="v2._mockFlag()">'+(m.flags&&m.flags[m.idx]?'Unflag':'Flag')+'</button><button class="v2-btn" '+(m.idx===m.ids.length-1?'disabled':'')+' onclick="v2._mockNav(1)">Next →</button></div>');
    // wire opts
    Array.prototype.forEach.call(body.querySelectorAll('.v2-opt'), function(el){
      el.addEventListener('click', function(){
        var idx = parseInt(el.dataset.opt, 10);
        if (multi) {
          var cur = Array.isArray(m.answers[m.idx]) ? m.answers[m.idx].slice() : [];
          if (cur.indexOf(idx) > -1) cur = cur.filter(function(x){ return x !== idx; });
          else cur.push(idx);
          m.answers[m.idx] = cur;
        } else {
          m.answers[m.idx] = idx;
        }
        renderMockRunning();
      });
    });
    // start timer if not running
    if (!_mockTimer) {
      _mockTimer = setInterval(function(){
        if (!state.mock) { clearInterval(_mockTimer); _mockTimer = null; return; }
        if (Date.now() >= state.mock.deadlineAt) { _mockSubmit(true); return; }
        var t = document.getElementById('v2-mock-timer');
        if (!t) return;
        var rem = Math.max(0, state.mock.deadlineAt - Date.now());
        var mm2 = Math.floor(rem/60000), ss2 = Math.floor((rem%60000)/1000);
        t.textContent = (mm2<10?'0':'')+mm2+':'+(ss2<10?'0':'')+ss2;
        t.className = 'timer ' + (rem < 5*60000 ? 'crit' : rem < 15*60000 ? 'warn' : '');
      }, 1000);
    }
  }

  function _mockNav(delta){
    if (!state.mock) return;
    state.mock.idx = Math.max(0, Math.min(state.mock.ids.length-1, state.mock.idx + delta));
    renderMockRunning();
  }
  function _mockFlag(){
    if (!state.mock) return;
    state.mock.flags = state.mock.flags || {};
    state.mock.flags[state.mock.idx] = !state.mock.flags[state.mock.idx];
    renderMockRunning();
  }
  function _mockSubmit(timedOut){
    if (!state.mock) return;
    if (!timedOut && !confirm('Submit your answers? You cannot return after this.')) return;
    var m = state.mock;
    m.finished = true;
    m.endedAt = Date.now();
    var correct = 0, byDomain = {D1:{c:0,t:0},D2:{c:0,t:0},D3:{c:0,t:0},D4:{c:0,t:0},D5:{c:0,t:0}};
    m.results = m.ids.map(function(qIdx, i){
      var q = v2Questions[qIdx];
      var picked = m.answers[i];
      var ok;
      if (Array.isArray(q.ans)) {
        ok = Array.isArray(picked) && picked.length === q.ans.length && picked.every(function(p){ return q.ans.indexOf(p) > -1; });
      } else {
        ok = picked === q.ans;
      }
      if (ok) correct++;
      if (byDomain[q.domain]) { byDomain[q.domain].t++; if (ok) byDomain[q.domain].c++; }
      return { qIdx: qIdx, picked: picked, ok: ok };
    });
    m.correct = correct;
    m.total = m.ids.length;
    m.scorePct = Math.round(correct / m.ids.length * 100);
    m.byDomain = byDomain;
    // persist to history (cap 10)
    state.mockHistory = [{startAt: m.startAt, endedAt: m.endedAt, scorePct: m.scorePct, correct: correct, total: m.ids.length, byDomain: byDomain}].concat(state.mockHistory).slice(0, 10);
    store.set('mockHistory', state.mockHistory);
    // record to recently-served map
    var recent = store.get('recentlyServed', {});
    var now = Date.now();
    m.ids.forEach(function(qi){ recent['q:'+qi] = now; });
    store.set('recentlyServed', recent);
    if (_mockTimer) { clearInterval(_mockTimer); _mockTimer = null; }
    renderMockScorecard();
  }
  function _mockExit(){
    state.mock = null;
    if (_mockTimer) { clearInterval(_mockTimer); _mockTimer = null; }
    renderMock();
  }

  function renderMockScorecard(){
    var body = document.getElementById('v2-mock-body');
    if (!body || !state.mock) return;
    var m = state.mock;
    var passed = m.scorePct >= 70;
    var html = '<div class="v2-h">Scorecard <span class="v2-pct" style="background:'+(passed?'rgba(52,211,153,.15)':'rgba(248,113,113,.15)')+';color:'+(passed?'var(--green)':'var(--red)')+'">'+(passed?'PASS':'BELOW PASS')+' · '+m.scorePct+'% · '+m.correct+'/'+m.total+'</span></div>'
      + '<div class="v2-meta">Real exam pass = 700/1000 (~70%). Time used: '+formatDuration(m.endedAt - m.startAt)+'</div>';
    html += '<div class="v2-h" style="margin-top:14px;font-size:12px">By domain</div>';
    Object.keys(m.byDomain).forEach(function(d){
      var bd = m.byDomain[d];
      var pct = bd.t ? Math.round(bd.c/bd.t*100) : 0;
      html += '<div class="v2-stat-row"><div class="v2-stat-label">'+d+'</div><div class="v2-stat-bar"><div style="width:'+pct+'%;background:'+(pct>=70?'var(--green)':pct>=50?'var(--amber)':'var(--red)')+'"></div></div><div class="v2-stat-val">'+pct+'% · '+bd.c+'/'+bd.t+'</div></div>';
    });
    var wrong = m.results.filter(function(r){ return !r.ok; });
    if (wrong.length) {
      html += '<div class="v2-h" style="margin-top:18px;font-size:12px">Missed questions ('+wrong.length+')</div>';
      wrong.forEach(function(r){
        var q = v2Questions[r.qIdx];
        var pickedStr = Array.isArray(r.picked)
          ? (r.picked.length ? r.picked.map(function(i){ return String.fromCharCode(65+i); }).join(', ') : 'none')
          : (typeof r.picked === 'number' ? String.fromCharCode(65+r.picked) : 'none');
        var ansStr = Array.isArray(q.ans) ? q.ans.map(function(i){ return String.fromCharCode(65+i); }).join(', ') : String.fromCharCode(65+q.ans);
        html += '<div class="v2-card"><div style="font-weight:600;font-size:12px;margin-bottom:6px">'+escapeHtml(q.domain)+(q.cluster?' · '+escapeHtml(q.cluster):'')+' — '+escapeHtml(q.q)+'</div>'
          + '<div style="font-size:11px;color:var(--muted)">Your answer: <em style="color:var(--red)">'+pickedStr+'</em> · Correct: <strong style="color:var(--green)">'+ansStr+'</strong></div>'
          + '<div class="v2-exp" style="margin-top:8px">'+escapeHtml(q.exp)+'</div>'
          + '</div>';
      });
    }
    html += '<div style="display:flex;gap:8px;margin-top:18px"><button class="v2-btn" onclick="v2._mockExit()">Done</button></div>';
    body.innerHTML = html;
  }

  function formatDuration(ms){
    var s = Math.floor(ms/1000);
    var m = Math.floor(s/60);
    return m + ' min ' + (s%60) + ' s';
  }

  // ── mock-exam composer (sampler — runner deferred to Phase 1+) ─
  function composeMock(){
    if (v2Questions.length < 65) return null;
    var weights = {D1:13, D2:16, D3:18, D4:9, D5:9}; // sums to 65
    var byDomain = {D1:[],D2:[],D3:[],D4:[],D5:[]};
    v2Questions.forEach(function(q,i){ if (byDomain[q.domain]) byDomain[q.domain].push(i); });
    var recently = store.get('recentlyServed', {});
    var now = Date.now();
    var SEVEN_DAYS = 7*86400000;
    var picked = [];
    Object.keys(weights).forEach(function(d){
      var pool = byDomain[d].filter(function(i){
        var ts = recently['q:'+i];
        return !ts || (now - ts) > SEVEN_DAYS;
      });
      if (pool.length < weights[d]) pool = byDomain[d];   // fall back if exhausted
      // task-statement minimum: ensure each task represented
      var byTask = {};
      pool.forEach(function(i){ var t = v2Questions[i].task || 'unknown'; (byTask[t] = byTask[t] || []).push(i); });
      var tasks = Object.keys(byTask);
      var pick = [];
      tasks.forEach(function(t){
        if (pick.length >= weights[d]) return;
        var arr = byTask[t];
        pick.push(arr[Math.floor(Math.random()*arr.length)]);
      });
      // fill remaining with weighted random
      while (pick.length < weights[d]) {
        var c = pool[Math.floor(Math.random()*pool.length)];
        if (pick.indexOf(c) === -1) pick.push(c);
      }
      picked = picked.concat(pick.slice(0, weights[d]));
    });
    return picked;
  }

  function startMock(){
    var ids = composeMock();
    if (!ids) { alert('Question bank not full yet — need 65+ questions.'); return; }
    state.mock = { startAt: Date.now(), ids: ids, answers: {}, idx: 0, deadlineAt: Date.now() + 90*60000 };
    renderMockRunning();
  }

  // ── search wiring ──────────────────────────────────────────────
  var _searchTimer = null;
  function wireSearch(){
    var inp = document.getElementById('v2-search-input');
    var clr = document.getElementById('v2-search-clear');
    if (!inp) return;
    inp.addEventListener('input', function(){
      if (clr) clr.style.display = this.value ? 'block' : 'none';
      clearTimeout(_searchTimer);
      var v = this.value;
      _searchTimer = setTimeout(function(){ renderSearchResults(v); }, 120);
    });
    inp.addEventListener('keydown', function(e){
      if (e.key === 'Escape') { closeSearch(); inp.value = ''; if (clr) clr.style.display = 'none'; }
    });
    if (clr) clr.addEventListener('click', function(){ inp.value = ''; this.style.display = 'none'; closeSearch(); inp.focus(); });
    document.addEventListener('mousedown', function(e){
      var box = document.getElementById('v2-search-results');
      var wrap = inp.closest('.v2-search-wrap');
      if (!box || box.hidden) return;
      if (wrap && wrap.contains(e.target)) return;
      if (box.contains(e.target)) return;
      box.hidden = true;
    });
  }

  // ── tab wiring (event delegation) ──────────────────────────────
  function wireTabs(){
    document.querySelectorAll('#v2-app .v2-tab').forEach(function(b){
      b.addEventListener('click', function(){ showTab(b.dataset.tab); });
    });
    document.querySelectorAll('#v2-panel-study .v2-subtab').forEach(function(b){
      b.addEventListener('click', function(){ showStudySub(b.dataset.sub); });
    });
    document.querySelectorAll('#v2-panel-drill .v2-subtab').forEach(function(b){
      b.addEventListener('click', function(){
        state.currentDrillMode = b.dataset.drill;
        store.set('drillMode', state.currentDrillMode);
        state.drillPreview = null;
        document.querySelectorAll('#v2-panel-drill .v2-subtab').forEach(function(x){ x.classList.toggle('active', x === b); });
        renderDrill();
      });
    });
  }

  // ── keyboard shortcuts ─────────────────────────────────────────
  function wireKeys(){
    document.addEventListener('keydown', function(e){
      var v2el = document.getElementById('v2-app');
      if (!v2el || v2el.hidden) return;
      if (e.target && /^(INPUT|TEXTAREA)$/.test(e.target.tagName)) return;
      if (e.key === '/') { e.preventDefault(); var inp = document.getElementById('v2-search-input'); if (inp) inp.focus(); }
      else if (e.key === 'Escape') closeSearch();
    });
  }

  // ── boot ───────────────────────────────────────────────────────
  function onShow(){
    if (!onShow._done) {
      buildSearchIndex();
      wireSearch();
      wireTabs();
      wireKeys();
      onShow._done = true;
    }
    showTab(state.currentTab || 'study');
    if (state.currentTab === 'study') showStudySub(state.currentStudySub || 'd1');
  }

  return {
    onShow: onShow,
    showTab: showTab,
    showStudySub: showStudySub,
    startMock: startMock,
    _rate: _rate,
    _mockNav: _mockNav,
    _mockFlag: _mockFlag,
    _mockSubmit: _mockSubmit,
    _mockExit: _mockExit,
    _setDrillDomain: _setDrillDomain,
    _setReferenceView: _setReferenceView,
    _toggleChecklist: _toggleChecklist,
    _drillWeakSpot: _drillWeakSpot,
    // exposed for DevTools / future phases
    state: state,
    store: store,
    srs: { get: srsGet, record: srsRecord, dueIds: srsDueIds },
    search: { rank: searchRank, rebuild: buildSearchIndex },
    composeMock: composeMock
  };
})();
</script></body></html>
